<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Javascript Web Output #3</title>
<style>
body {
    font-family: Arial, Helvetica, sans-serif;
}
table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 15px;
}
th, td {
    border: 1px solid #ccc;
    padding: 8px;
}
.completed {
    color: green;
    font-weight: bold;
}
.notCompleted {
    color: red;
    font-weight: bold;
}
/* Hide table initially */
#todoTable {
    display: none;
}
</style>
</head>
<body>

<h1>Javascript Web Output #3</h1>

<button id="loadBtn">Load data from the API</button>
<button id="clearBtn">Clear Table</button>

<p>
API: <a href="https://jsonplaceholder.typicode.com/todos/" target="_blank">
https://jsonplaceholder.typicode.com/todos/
</a>
</p>

<table id="todoTable">
    <thead>
        <tr>
            <th>User ID</th>
            <th>Task ID</th>
            <th>Title</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script type="module" src="main.js"></script>

</body>
</html>
