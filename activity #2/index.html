<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Web Output #2</title>
    
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
    }

    table, th, td{
        border-collapse: collapse;
    }

    #tblRecords{
        margin:auto;
    }

    .sort-container{
        display:inline-block;
        margin-left:10px;
    }

    button{
        margin-right:5px;
    }


    #bottomControls{
        display:none;
    }
</style>

</head>
<body>
    <h1>Javascript Web Output #2</h1>

    <table id="tblInput">
        <tr>
            <td width="45%">First Name:</td>
            <td><input type="text"></td>
        </tr>

        <tr>
            <td>Middle Name:</td>
            <td><input type="text"></td>
        </tr>

        <tr>
            <td>Last Name:</td>
            <td><input type="text"></td>
        </tr>

        <tr>
            <td>Age:</td>
            <td><input type="number"></td>
        </tr>

        <tr>
            <td></td>
            <td style="padding-top:10px;">
                <button id="btnInsertUpdate" value="insert">Insert</button>
                <button id="btnClear">Clear</button>
            </td>
        </tr>

    </table>

    <br>

    <fieldset>

        <legend>Records</legend>

        <p id="status" style="color:red;font-size:12px;">No Records...</p>

        <table id="tblRecords"></table>

    </fieldset>

    <br>

    <div id="bottomControls">

        <button id="btnClearItems">Clear Records</button>

        <div class="sort-container">

            <label>Sort by:</label>

            <select id="sortField">
                <option value="fname">First Name</option>
                <option value="mname">Middle Name</option>
                <option value="lname">Last Name</option>
                <option value="age">Age</option>
            </select>

            <select id="sortOrder">
                <option value="asc">A-Z / Youngest</option>
                <option value="desc">Z-A / Oldest</option>
            </select>

            <button id="btnSave">Save to Local Storage</button>

        </div>

    </div>

    <script src="main.js"></script>

</body>
</html>
